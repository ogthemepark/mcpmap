<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>mcpmap — {{SCAN_ID}}</title>
  <style>
    :root {
      --bg: #0a0a0c;
      --bg-alt: #111114;
      --bg-row: #131318;
      --border: #222428;
      --border-soft: #1a1c20;
      --fg: #d8d6cf;
      --fg-dim: #8a8a82;
      --fg-faint: #4a4a44;
      --accent: #5fd5e3;
      --sev-critical: #ff3b3b;
      --sev-high:     #ff8a3b;
      --sev-medium:   #ffcc3b;
      --sev-low:      #7eaa6e;
      --sev-info:     #6c7280;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: "JetBrains Mono", "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
      line-height: 1.45;
      height: 100%;
      overflow: hidden;
    }
    /* phosphor scanlines — barely visible, gives the CRT feel without noise */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent 0 2px,
        rgba(255, 255, 255, 0.012) 2px 3px
      );
      z-index: 100;
    }
    .grid {
      display: grid;
      grid-template-rows: 56px 44px 48px 1fr;
      grid-template-columns: 280px 1fr 440px;
      grid-template-areas:
        "header  header  header"
        "strip   strip   strip"
        "filter  filter  filter"
        "servers findings detail";
      height: 100vh;
    }
    #header {
      grid-area: header;
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 0 20px;
      background: var(--bg-alt);
      border-bottom: 1px solid var(--border);
    }
    #header .brand {
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--accent);
    }
    #header .scan-id {
      color: var(--fg-dim);
      font-size: 12px;
    }
    #header .totals {
      margin-left: auto;
      color: var(--fg-dim);
      font-size: 12px;
    }
    #header .totals b { color: var(--fg); font-weight: 600; }
    #severity-strip {
      grid-area: strip;
      display: flex;
      align-items: stretch;
      background: var(--bg-alt);
      border-bottom: 1px solid var(--border);
    }
    #severity-strip .seg {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      border-right: 1px solid var(--border-soft);
      cursor: pointer;
      user-select: none;
      transition: background 0.1s;
    }
    #severity-strip .seg:last-child { border-right: 0; }
    #severity-strip .seg:hover { background: var(--bg-row); }
    #severity-strip .seg.active { background: var(--bg-row); box-shadow: inset 0 -2px 0 var(--accent); }
    #severity-strip .sigil { font-size: 18px; line-height: 1; }
    #severity-strip .label { font-size: 11px; letter-spacing: 0.08em; color: var(--fg-dim); }
    #severity-strip .count { font-size: 18px; font-weight: 700; }
    .sev-critical { color: var(--sev-critical); }
    .sev-high     { color: var(--sev-high); }
    .sev-medium   { color: var(--sev-medium); }
    .sev-low      { color: var(--sev-low); }
    .sev-info     { color: var(--sev-info); }
    #filter-bar {
      grid-area: filter;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      background: var(--bg-alt);
      border-bottom: 1px solid var(--border);
    }
    #filter-bar select, #filter-bar input {
      background: var(--bg);
      color: var(--fg);
      border: 1px solid var(--border);
      padding: 6px 10px;
      font: inherit;
      border-radius: 0;
    }
    #filter-bar input { flex: 1; max-width: 360px; }
    #filter-bar select:focus, #filter-bar input:focus {
      outline: 1px solid var(--accent);
      outline-offset: -1px;
    }
    #filter-bar .reset {
      background: none;
      color: var(--fg-dim);
      border: 1px solid var(--border);
      padding: 6px 10px;
      cursor: pointer;
      font: inherit;
    }
    #filter-bar .reset:hover { color: var(--fg); border-color: var(--fg-dim); }
    #server-list {
      grid-area: servers;
      overflow-y: auto;
      border-right: 1px solid var(--border);
      background: var(--bg-alt);
    }
    #server-list .server {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border-soft);
      cursor: pointer;
    }
    #server-list .server:hover { background: var(--bg-row); }
    #server-list .server.selected { background: var(--bg-row); box-shadow: inset 3px 0 0 var(--accent); }
    #server-list .server .name { font-weight: 600; }
    #server-list .server .url { color: var(--fg-dim); font-size: 11px; }
    #server-list .server .sevline { display: flex; gap: 8px; margin-top: 4px; font-size: 11px; color: var(--fg-dim); }
    #server-list .server .sevline span.has { color: var(--fg); font-weight: 600; }
    #finding-list {
      grid-area: findings;
      overflow-y: auto;
    }
    #finding-list .finding {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border-soft);
      cursor: pointer;
      display: grid;
      grid-template-columns: 22px 110px 60px 70px 1fr;
      gap: 12px;
      align-items: baseline;
    }
    #finding-list .finding:hover { background: var(--bg-row); }
    #finding-list .finding.selected { background: var(--bg-row); box-shadow: inset 3px 0 0 var(--accent); }
    #finding-list .finding .sigil { font-size: 16px; }
    #finding-list .finding .check { font-weight: 600; }
    #finding-list .finding .sev { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }
    #finding-list .finding .cvss { color: var(--fg-dim); font-size: 11px; }
    #finding-list .finding .title { color: var(--fg); }
    #detail-pane {
      grid-area: detail;
      overflow-y: auto;
      padding: 18px 20px;
      border-left: 1px solid var(--border);
      background: var(--bg-alt);
    }
    #detail-pane .empty { color: var(--fg-faint); font-style: italic; padding: 40px 0; text-align: center; }
    #detail-pane h2 { margin: 0 0 8px; font-size: 14px; font-weight: 700; letter-spacing: 0.04em; }
    #detail-pane .meta { color: var(--fg-dim); font-size: 11px; margin-bottom: 18px; }
    #detail-pane .meta .row { display: flex; gap: 8px; }
    #detail-pane .meta .k { color: var(--fg-faint); width: 80px; }
    #detail-pane .section-h { display: flex; align-items: center; gap: 8px; margin: 18px 0 6px; font-size: 11px; letter-spacing: 0.08em; color: var(--fg-dim); text-transform: uppercase; }
    #detail-pane .section-h .copy {
      margin-left: auto;
      background: none;
      border: 1px solid var(--border);
      color: var(--fg-dim);
      cursor: pointer;
      padding: 2px 8px;
      font: inherit;
      font-size: 10px;
    }
    #detail-pane .section-h .copy:hover { color: var(--fg); border-color: var(--fg-dim); }
    #detail-pane pre {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 10px 12px;
      font-size: 12px;
      overflow-x: auto;
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
    }
    #detail-pane .fix { background: var(--bg); border-left: 2px solid var(--sev-low); padding: 10px 12px; }
    .pill {
      display: inline-block;
      padding: 1px 8px;
      border: 1px solid var(--border);
      color: var(--fg-dim);
      font-size: 11px;
      margin-right: 6px;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="grid">
  <header id="header">
    <span class="brand">mcpmap</span>
    <span class="scan-id" id="scan-id">{{SCAN_ID}}</span>
    <span class="totals" id="totals"></span>
  </header>

  <div id="severity-strip"></div>

  <div id="filter-bar">
    <select id="f-severity"><option value="">all severities</option></select>
    <select id="f-check"><option value="">all checks</option></select>
    <select id="f-server"><option value="">all servers</option></select>
    <input id="f-search" type="text" placeholder="search title / evidence / fix…">
    <button class="reset" id="f-reset">reset</button>
  </div>

  <aside id="server-list" role="navigation"></aside>
  <main id="finding-list" role="main"></main>
  <aside id="detail-pane" role="complementary"><div class="empty">select a finding to view evidence, repro, remediation</div></aside>
</div>

<script>
function esc(s){ const d=document.createElement("div"); d.textContent=String(s??''); return d.innerHTML; }

const SIGIL = {
  critical: "▣",
  high:     "◆",
  medium:   "◈",
  low:      "○",
  info:     "·",
};
const SEV_ORDER = ["critical", "high", "medium", "low", "info"];

const data = {{DATA_JSON}};

// state — populated by Tasks 2 & 3
const state = {
  selectedServer: null,
  selectedFinding: null,
  filter: { severity: "", check: "", server: "", q: "" },
};

function maxSev(findings){
  for (const s of SEV_ORDER){ if (findings.some(f => f.severity === s)) return s; }
  return null;
}

function flatFindings(){
  // Returns array of { url, finding } pairs for every finding in the scan.
  const out = [];
  for (const [url, fs] of Object.entries(data.findings || {})){
    for (const f of fs){ out.push({ url, f }); }
  }
  return out;
}

function severityCounts(){
  const c = { critical: 0, high: 0, medium: 0, low: 0, info: 0 };
  for (const { f } of flatFindings()){ if (c[f.severity] != null) c[f.severity]++; }
  return c;
}

function uniqueChecks(){
  const s = new Set();
  for (const { f } of flatFindings()){ s.add(f.check); }
  return Array.from(s).sort();
}

function renderHeader(){
  const totalFindings = flatFindings().length;
  const el = document.getElementById("totals");
  el.innerHTML = `<b>${esc(data.servers.length)}</b> servers · <b>${esc(totalFindings)}</b> findings`;
}

function renderSeverityStrip(){
  const c = severityCounts();
  const strip = document.getElementById("severity-strip");
  strip.innerHTML = SEV_ORDER.map(sev =>
    `<div class="seg ${state.filter.severity === sev ? 'active' : ''}" data-sev="${esc(sev)}">
       <span class="sigil sev-${esc(sev)}">${esc(SIGIL[sev])}</span>
       <span class="count sev-${esc(sev)}">${esc(c[sev])}</span>
       <span class="label">${esc(sev)}</span>
     </div>`
  ).join("");
  // Click a segment to filter by that severity.
  strip.querySelectorAll(".seg").forEach(seg => {
    seg.addEventListener("click", () => {
      const s = seg.dataset.sev;
      state.filter.severity = (state.filter.severity === s) ? "" : s;
      document.getElementById("f-severity").value = state.filter.severity;
      renderAll();
    });
  });
}

function renderFilterBar(){
  // Populate dynamic options once (not on every render — preserve user typing).
  const sevSel = document.getElementById("f-severity");
  if (sevSel.options.length <= 1){
    for (const s of SEV_ORDER){
      const o = document.createElement("option");
      o.value = s; o.textContent = s;
      sevSel.appendChild(o);
    }
  }
  const checkSel = document.getElementById("f-check");
  if (checkSel.options.length <= 1){
    for (const c of uniqueChecks()){
      const o = document.createElement("option");
      o.value = c; o.textContent = c;
      checkSel.appendChild(o);
    }
  }
  const srvSel = document.getElementById("f-server");
  if (srvSel.options.length <= 1){
    for (const s of data.servers){
      const o = document.createElement("option");
      o.value = s.url; o.textContent = (s.server_info?.name || s.url);
      srvSel.appendChild(o);
    }
  }
  sevSel.value = state.filter.severity;
  checkSel.value = state.filter.check;
  srvSel.value = state.filter.server;
  document.getElementById("f-search").value = state.filter.q;
  // Filter wiring lives in Task 3 (handlers attached in initFilters()).
}

function renderServerList(){
  // Emits one node with class="server" per entry in data.servers.
  const el = document.getElementById("server-list");
  el.innerHTML = data.servers.map(s => {
    const fs = data.findings[s.url] || [];
    const c = { critical: 0, high: 0, medium: 0, low: 0, info: 0 };
    for (const f of fs){ if (c[f.severity] != null) c[f.severity]++; }
    const segs = SEV_ORDER.map(sev =>
      `<span class="${c[sev] ? 'has' : ''} sev-${esc(sev)}">${esc(SIGIL[sev])} ${esc(c[sev])}</span>`
    ).join("");
    const sel = state.selectedServer === s.url ? "selected" : "";
    const name = s.server_info?.name || "unknown";
    const ver = s.server_info?.version || "?";
    return `<div class="server${sel ? ' ' + sel : ''}" data-server="${esc(s.url)}">
              <div class="name">${esc(name)} <span style="color:var(--fg-dim);font-weight:400">${esc(ver)}</span></div>
              <div class="url">${esc(s.url)}</div>
              <div class="sevline">${segs}</div>
            </div>`;
  }).join("");
  el.querySelectorAll(".server").forEach(node => {
    node.addEventListener("click", () => {
      const url = node.dataset.server;
      state.selectedServer = (state.selectedServer === url) ? null : url;
      // Selecting a server filters the finding list to that server.
      state.filter.server = state.selectedServer || "";
      renderAll();
    });
  });
}

function findingMatchesFilter(url, f){
  const ft = state.filter;
  if (ft.severity && f.severity !== ft.severity) return false;
  if (ft.check && f.check !== ft.check) return false;
  if (ft.server && url !== ft.server) return false;
  if (ft.q){
    const q = ft.q.toLowerCase();
    const hay = [f.check, f.title, f.severity, f.repro || "", f.remediation || "",
                 JSON.stringify(f.evidence || {})].join(" ").toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function renderFindingList(){
  const el = document.getElementById("finding-list");
  const items = flatFindings().filter(({ url, f }) => findingMatchesFilter(url, f));
  // Sort: severity (critical first), then by check ID alphabetically.
  items.sort((a, b) => SEV_ORDER.indexOf(a.f.severity) - SEV_ORDER.indexOf(b.f.severity)
                      || a.f.check.localeCompare(b.f.check));
  if (!items.length){
    el.innerHTML = `<div style="padding:40px;text-align:center;color:var(--fg-faint)">no findings match these filters</div>`;
    return;
  }
  el.innerHTML = items.map(({ url, f }, i) => {
    const sel = state.selectedFinding === `${url}|${f.check}|${i}` ? "selected" : "";
    return `<div class="finding ${sel}" data-severity="${esc(f.severity)}" data-check="${esc(f.check)}" data-server="${esc(url)}" data-key="${esc(url + '|' + f.check + '|' + i)}">
              <span class="sigil sev-${esc(f.severity)}">${esc(SIGIL[f.severity])}</span>
              <span class="check">${esc(f.check)}</span>
              <span class="sev sev-${esc(f.severity)}">${esc(f.severity)}</span>
              <span class="cvss">CVSS ${esc(f.cvss ?? '-')}</span>
              <span class="title">${esc(f.title)}</span>
            </div>`;
  }).join("");
  el.querySelectorAll(".finding").forEach(node => {
    node.addEventListener("click", () => {
      state.selectedFinding = node.dataset.key;
      renderAll();
    });
  });
}

function renderDetail(){
  const el = document.getElementById("detail-pane");
  if (!state.selectedFinding){
    el.innerHTML = `<div class="empty">select a finding to view evidence, repro, remediation</div>`;
    return;
  }
  // Find the finding by key.
  const items = flatFindings();
  const found = items.find(({ url, f }, i) => `${url}|${f.check}|${i}` === state.selectedFinding);
  if (!found){
    el.innerHTML = `<div class="empty">finding not found</div>`;
    return;
  }
  const { url, f } = found;
  const srv = data.servers.find(s => s.url === url);
  const sname = srv?.server_info?.name || "unknown";
  const sver = srv?.server_info?.version || "?";
  el.innerHTML = `
    <h2 class="sev-${esc(f.severity)}">${esc(SIGIL[f.severity])} ${esc(f.check)} — ${esc(f.title)}</h2>
    <div class="meta">
      <div class="row"><span class="k">target</span><span>${esc(url)}</span></div>
      <div class="row"><span class="k">server</span><span>${esc(sname)} ${esc(sver)}</span></div>
      <div class="row"><span class="k">severity</span><span class="sev-${esc(f.severity)}">${esc(f.severity.toUpperCase())} · CVSS ${esc(f.cvss ?? '-')}</span></div>
      ${f.cve ? `<div class="row"><span class="k">cve</span><span>${esc(f.cve)}</span></div>` : ''}
    </div>
    <!-- evidence / repro / remediation rendering is filled in by Task 3 -->
    <div id="detail-body"></div>
  `;
}

function renderAll(){
  renderHeader();
  renderSeverityStrip();
  renderFilterBar();
  renderServerList();
  renderFindingList();
  renderDetail();
}

renderAll();
</script>
</body>
</html>
